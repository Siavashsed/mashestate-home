<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Page Not Found — Mash Estate</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{  --bg:#f9fafb;--bg2:#f3f4f6;--sur:#e9eaec;
  --pri:#1e3a6e;--pri2:#1e40af;
  --txt:#111827;--mut:#6b7280;--brd:#d1d5db;
  --fh:Georgia,serif;--fb:system-ui,sans-serif;--fm:monospace;}
body{font-family:var(--fb);background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.e404-code{font-size:80px;font-weight:900;color:var(--pri);opacity:.3;line-height:1;margin-bottom:16px}
.e404-title{font-size:24px;font-weight:700;margin-bottom:10px}
.e404-sub{font-size:15px;color:var(--mut);max-width:440px;line-height:1.7;margin-bottom:28px}
.e404-back{display:inline-block;background:var(--pri);color:#000;border-radius:6px;padding:12px 28px;font-size:15px;font-weight:700;text-decoration:none;transition:opacity .2s}
.e404-back:hover{opacity:.85}
.e404-note{font-size:12px;color:var(--mut);margin-top:16px}
</style>
</head>
<body>
<div class="e404-code">404</div>
<div class="e404-title">This article isn't here yet</div>
<div class="e404-sub">It may still be publishing, or the link changed. New articles appear on the homepage within 24 hours.</div>
<a href="/" class="e404-back">← Back to Mash Estate</a>
<div class="e404-note">If you followed a bookmark, try refreshing — or check the homepage for the latest articles.</div>
<script>setTimeout(()=>location.href='/',8000);</script>
</body></html>
